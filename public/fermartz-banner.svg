<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0f1a"/>
    </linearGradient>
    
    <!-- Accent glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
      <stop offset="70%" style="stop-color:#7c3aed;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1f2e" stroke-width="0.5"/>
    </pattern>

    <!-- Hexagon pattern -->
    <pattern id="hex" width="60" height="52" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <polygon points="30,2 55,15 55,37 30,50 5,37 5,15" fill="none" stroke="#151b2b" stroke-width="0.6"/>
    </pattern>

    <!-- Cursor blink animation -->
    <style>
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 1.2s infinite; }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes scanline {
        0% { transform: translateY(-320px); }
        100% { transform: translateY(320px); }
      }
      .scanline {
        animation: scanline 4s linear infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>
  <rect width="900" height="320" fill="url(#hex)" opacity="0.6"/>
  <rect width="900" height="320" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Center glow -->
  <ellipse cx="450" cy="160" rx="350" ry="200" fill="url(#glow)"/>
  
  <!-- Scanline effect -->
  <rect class="scanline" x="0" y="0" width="900" height="2" fill="#7c3aed" opacity="0.04"/>

  <!-- Subtle top/bottom border accents -->
  <rect x="0" y="0" width="900" height="1" fill="#7c3aed" opacity="0.4"/>
  <rect x="0" y="319" width="900" height="1" fill="#7c3aed" opacity="0.4"/>

  <!-- Decorative dots left -->
  <circle cx="80" cy="60" r="1.5" fill="#7c3aed" opacity="0.3"/>
  <circle cx="100" cy="45" r="1" fill="#06d6a0" opacity="0.25"/>
  <circle cx="60" cy="80" r="1" fill="#7c3aed" opacity="0.2"/>
  <circle cx="120" cy="75" r="1.5" fill="#06d6a0" opacity="0.15"/>

  <!-- Decorative dots right -->
  <circle cx="820" cy="250" r="1.5" fill="#7c3aed" opacity="0.3"/>
  <circle cx="800" cy="270" r="1" fill="#06d6a0" opacity="0.25"/>
  <circle cx="840" cy="235" r="1" fill="#7c3aed" opacity="0.2"/>
  <circle cx="780" cy="260" r="1.5" fill="#06d6a0" opacity="0.15"/>

  <!-- === CHARACTER AVATAR === -->
  <g transform="translate(400, 30) scale(0.65)" fill="#e2e8f0" opacity="0.9">
    <path d="M80.4,28.74c3.47,0,11.09,5.72,11.09,5.72S98,32.2,98.22,28.74,104.94,35,104.94,35s7.75-8.91,8.26-4.12,7,12.37,7,12.37,7.9-12.87,8.41-7.28,6,13.13,6,13.13,3.91-1.4,5.69-3.79S143.15,56,143.15,56l4.43,32.59A29.75,29.75,0,0,1,152,104.89a25.43,25.43,0,0,1-5.53,16.29l-9.95,27.94c-4.42,9.31-22.11,23.27-35.38,23.27s-31-14-35.39-23.27l-10-27.94a25.49,25.49,0,0,1-5.53-16.29A29.76,29.76,0,0,1,54.7,88.6V49c0-1.53,4.42,2.32,4.42,2.32s5.73-14.5,8.85-14C67.64,39.78,70.18,42,70.18,42S76.94,28.75,80.4,28.74Zm26.07,31C94.65,52,86.56,58.4,74.75,58.4Q65.89,63,63.67,79.29h0l-2.21,30.19c0,8.12,10,32.5,11.07,34.82C81.39,160.55,99.11,164,101.32,164s19.93-3.48,28.79-19.73c1.11-2.32,11.08-26.7,11.08-34.82l-1.11-25.54L134.54,70,129,66.94,123.47,64s-4.88-1-5.82-1.3-1.2-.56-4.05-1.69M78.69,93.42a6.39,6.39,0,1,0,6.09,6.39,6.25,6.25,0,0,0-6.09-6.39m45.92.85a6.39,6.39,0,1,0,6.09,6.39,6.25,6.25,0,0,0-6.09-6.39M68.87,95.39a11.24,11.24,0,0,1,7.08-6c3.66-.93,7.87.12,11.85,3.25A2.22,2.22,0,0,0,90.9,92a2.46,2.46,0,0,0-.55-3.25c-6.53-4.88-12.07-4.88-15.5-4a15.37,15.37,0,0,0-10,8.48,2.38,2.38,0,0,0,1,3.13,3,3,0,0,0,1,.23A2.33,2.33,0,0,0,68.87,95.39Zm68.88,0a2.43,2.43,0,0,0,.22-3.25c-4-4.76-8.63-7.2-13.84-7.08q-5.64,0-12.29,4.18a2.26,2.26,0,0,0-.78,3.13,2.05,2.05,0,0,0,3,.81c3.77-2.32,7.09-3.48,10.19-3.48,3.88,0,7.31,1.74,10.52,5.46a2,2,0,0,0,1.66.81A2.52,2.52,0,0,0,137.75,95.43Zm-46,43.23c4.45,3,14,1.79,20.92,2.69a2.54,2.54,0,0,1,2.68,2.12c.09,1.31-2.57,2.4-2.57,2.4s-21.44-.42-22.65-1.27-3.58-5.43-2.83-6.37C88.19,137.1,90.12,137.38,91.74,138.66Zm5.91-17.37h8.6c.66,0,1.24.76,1.28,1.75s-.53,2-1.23,2H97.73c-.66,0-1.24-.76-1.27-1.76s.52-2,1.22-2"/>
  </g>

  <!-- === TERMINAL PROMPT === -->
  <g transform="translate(450, 185)">
    <!-- Terminal prompt text -->
    <text text-anchor="middle" y="0" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="38" font-weight="700" letter-spacing="4">
      <tspan fill="#06d6a0" opacity="0.9">&gt;</tspan>
      <tspan fill="#7c3aed" opacity="0.8"> $ </tspan>
      <tspan fill="#e2e8f0">FERMARTZ</tspan>
    </text>
    
    <!-- Blinking cursor -->
    <rect class="cursor" x="168" y="-26" width="3" height="34" fill="#06d6a0" opacity="0.8" rx="1"/>
  </g>

  <!-- === SUBTITLE === -->
  <text x="450" y="230" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="13" fill="#8b95a5" letter-spacing="3" opacity="0.7">
    BUILDING LIVING SYSTEMS WITH AI × CRYPTO × CODE
  </text>

  <!-- Accent line under subtitle -->
  <line x1="310" y1="248" x2="590" y2="248" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>

  <!-- === STATUS BADGES === -->
  <g transform="translate(450, 280)" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="10" letter-spacing="1.5">
    <text x="-180" fill="#fd2bff" opacity="0.5">◆ VIBEPOP.CO</text>
    <text x="0" fill="#06d6a0" opacity="0.5">◆ ASTRANOVA.LIVE</text>
    <text x="160" fill="#7c3aed" opacity="0.5">◆ ASTRA CLI</text>
  </g>

</svg>